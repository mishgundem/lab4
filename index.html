<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ пиццы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f0e8;
        }
        .block {
            background: #fef9e6;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        select, input {
            margin: 5px 0;
            padding: 5px;
        }
        button {
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn {
            background: #c0392b;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #d5f5e3;
            border-radius: 8px;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
        .privetstvie {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #c0392b;
        }
        .form-container {
            background: #fef9e6;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .pizza-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }
        .pizza-name {
            min-width: 120px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="formaFio" class="form-container">
    <h2>Введите ваши данные</h2>
    <form id="authForm">
        <label>Фамилия:</label>
        <input type="text" id="familiya" placeholder="Введите фамилию"><br>
        <label>Имя:</label>
        <input type="text" id="imya" placeholder="Введите имя"><br>
        <label>Отчество:</label>
        <input type="text" id="otchestvo" placeholder="Введите отчество"><br>
        <button type="button" onclick="startOrder()" style="background:#c0392b">Продолжить</button>
    </form>
</div>

<div id="orderSection" class="hidden">
    <div id="privetstvie" class="privetstvie"></div>
    <h2>Выберите пиццу, размер и количество</h2>

    <form action="mailto:test@example.com" method="post" enctype="text/plain">
        
        <div class="block">
            <div class="pizza-row">
                <div class="pizza-name">
                    <input type="checkbox" id="pizza0_check" onclick="togglePizza(0)"> Маргарита
                </div>
                <select id="pizza0_size" disabled>
                    <option value="250">Маленькая (250 руб.)</option>
                    <option value="350">Средняя (350 руб.)</option>
                    <option value="450">Большая (450 руб.)</option>
                </select>
                <input type="number" id="pizza0_qty" value="1" min="1" max="100" disabled style="width:70px;" oninput="updateTotal(0)" onchange="updateTotal(0)">
                <strong>Итого: <span id="total0">0</span> руб.</strong>
            </div>
        </div>

        <div class="block">
            <div class="pizza-row">
                <div class="pizza-name">
                    <input type="checkbox" id="pizza1_check" onclick="togglePizza(1)"> Пепперони
                </div>
                <select id="pizza1_size" disabled>
                    <option value="300">Маленькая (300 руб.)</option>
                    <option value="420">Средняя (420 руб.)</option>
                    <option value="550">Большая (550 руб.)</option>
                </select>
                <input type="number" id="pizza1_qty" value="1" min="1" max="100" disabled style="width:70px;" oninput="updateTotal(1)" onchange="updateTotal(1)">
                <strong>Итого: <span id="total1">0</span> руб.</strong>
            </div>
        </div>

        <div class="block">
            <div class="pizza-row">
                <div class="pizza-name">
                    <input type="checkbox" id="pizza2_check" onclick="togglePizza(2)"> Гавайская
                </div>
                <select id="pizza2_size" disabled>
                    <option value="280">Маленькая (280 руб.)</option>
                    <option value="390">Средняя (390 руб.)</option>
                    <option value="500">Большая (500 руб.)</option>
                </select>
                <input type="number" id="pizza2_qty" value="1" min="1" max="100" disabled style="width:70px;" oninput="updateTotal(2)" onchange="updateTotal(2)">
                <strong>Итого: <span id="total2">0</span> руб.</strong>
            </div>
        </div>

        <div class="block">
            <div class="pizza-row">
                <div class="pizza-name">
                    <input type="checkbox" id="pizza3_check" onclick="togglePizza(3)"> Четыре сыра
                </div>
                <select id="pizza3_size" disabled>
                    <option value="320">Маленькая (320 руб.)</option>
                    <option value="450">Средняя (450 руб.)</option>
                    <option value="580">Большая (580 руб.)</option>
                </select>
                <input type="number" id="pizza3_qty" value="1" min="1" max="100" disabled style="width:70px;" oninput="updateTotal(3)" onchange="updateTotal(3)">
                <strong>Итого: <span id="total3">0</span> руб.</strong>
            </div>
        </div>

        <div class="block">
            <div class="pizza-row">
                <div class="pizza-name">
                    <input type="checkbox" id="pizza4_check" onclick="togglePizza(4)"> Мясная
                </div>
                <select id="pizza4_size" disabled>
                    <option value="350">Маленькая (350 руб.)</option>
                    <option value="480">Средняя (480 руб.)</option>
                    <option value="620">Большая (620 руб.)</option>
                </select>
                <input type="number" id="pizza4_qty" value="1" min="1" max="100" disabled style="width:70px;" oninput="updateTotal(4)" onchange="updateTotal(4)">
                <strong>Итого: <span id="total4">0</span> руб.</strong>
            </div>
        </div>

        <div class="block">
            <h3>Доставка</h3>
            <input type="radio" name="delivery" value="Самовывоз (бесплатно)" checked> Самовывоз (бесплатно)<br>
            <input type="radio" name="delivery" value="Доставка (+5% от суммы)"> Доставка (+5% от суммы)
        </div>

        <input type="hidden" name="Заказ" id="orderSummary">
        
        <button type="button" class="btn" onclick="calculateOrder()">Оформить заказ</button>
        <button type="submit" class="btn" onclick="return prepareAndSend()">Отправить на почту</button>
        <button type="button" class="btn" onclick="resetOrder()">Сбросить</button>
    </form>

    <div id="result" class="result">
        Нажмите "Оформить заказ" для подсчета суммы
    </div>
</div>

<script>

    
    var pizzaNames = ['Маргарита', 'Пепперони', 'Гавайская', 'Четыре сыра', 'Мясная'];
    var largePrices = [450, 550, 500, 580, 620];
    var currentOrderSum = 0;
    var currentLargeCount = 0;
    var currentDeliveryText = "";
    var currentDrinkText = "";
    var currentTotalSum = 0;

    function startOrder() {
        var familiya = document.getElementById('familiya').value;
        var imya = document.getElementById('imya').value;
        var otchestvo = document.getElementById('otchestvo').value;
        
        if (!familiya || !imya) {
            alert("Пожалуйста, введите фамилию и имя!");
            return;
        }
        
        var polnoeImya = familiya + " " + imya + (otchestvo ? " " + otchestvo : "");
        
        if (confirm(polnoeImya + "\nВсе верно?")) {
            alert("Добро пожаловать!\n" + polnoeImya);
            document.getElementById('formaFio').style.display = 'none';
            document.getElementById('orderSection').style.display = 'block';
            document.getElementById('privetstvie').innerHTML = "Здравствуйте, " + polnoeImya + "!<br>Выберите пиццу:";
        } else {
            alert("Ошибка! Введите данные заново.");
            document.getElementById('familiya').value = "";
            document.getElementById('imya').value = "";
            document.getElementById('otchestvo').value = "";
            document.getElementById('familiya').focus();
        }
    }

    function togglePizza(index) {
        var checkbox = document.getElementById('pizza' + index + '_check');
        var sizeSelect = document.getElementById('pizza' + index + '_size');
        var qtyInput = document.getElementById('pizza' + index + '_qty');
        var totalSpan = document.getElementById('total' + index);
        
        if (checkbox.checked) {
            sizeSelect.disabled = false;
            qtyInput.disabled = false;
            updateTotal(index);
        } else {
            sizeSelect.disabled = true;
            qtyInput.disabled = true;
            totalSpan.innerHTML = '0';
        }
    }

    function updateTotal(index) {
        var checkbox = document.getElementById('pizza' + index + '_check');
        if (!checkbox.checked) {
            document.getElementById('total' + index).innerHTML = '0';
            return 0;
        }
        
        var sizeSelect = document.getElementById('pizza' + index + '_size');
        var qtyInput = document.getElementById('pizza' + index + '_qty');
        var price = parseInt(sizeSelect.value);
        var qty = parseInt(qtyInput.value) || 1;
        var total = price * qty;
        
        document.getElementById('total' + index).innerHTML = total;
        return total;
    }

    function getDeliveryValue() {
        var radios = document.getElementsByName('delivery');
        for (var i = 0; i < radios.length; i++) {
            if (radios[i].checked) return radios[i].value;
        }
        return 'Самовывоз (бесплатно)';
    }

    function getLargePizzasCount() {
        var count = 0;
        for (var i = 0; i < 5; i++) {
            var checkbox = document.getElementById('pizza' + i + '_check');
            if (checkbox && checkbox.checked) {
                var sizeSelect = document.getElementById('pizza' + i + '_size');
                var qty = parseInt(document.getElementById('pizza' + i + '_qty').value) || 1;
                if (parseInt(sizeSelect.value) === largePrices[i]) {
                    count = count + qty;
                }
            }
        }
        return count;
    }

    function calculateOrder() {
        var anyChecked = false;
        for (var i = 0; i < 5; i++) {
            if (document.getElementById('pizza' + i + '_check').checked) {
                anyChecked = true;
                break;
            }
        }
        
        if (!anyChecked) {
            document.getElementById('result').innerHTML = '<span style="color: red;">Выберите хотя бы одну пиццу!</span>';
            return;
        }

        var orderSum = 0;
        var detailsHtml = '<h3>Ваш заказ:</h3>';
        
        for (var i = 0; i < 5; i++) {
            var checkbox = document.getElementById('pizza' + i + '_check');
            if (checkbox.checked) {
                var sizeSelect = document.getElementById('pizza' + i + '_size');
                var qty = parseInt(document.getElementById('pizza' + i + '_qty').value) || 1;
                var price = parseInt(sizeSelect.value);
                var total = price * qty;
                orderSum = orderSum + total;
                
                var sizeText = sizeSelect.options[sizeSelect.selectedIndex].text.split(' ')[0];
                detailsHtml = detailsHtml + '<div>' + pizzaNames[i] + ' (' + sizeText + ') x ' + qty + ' шт. = ' + total + ' руб.</div>';
            }
        }

        var largeCount = getLargePizzasCount();
        var deliveryValue = getDeliveryValue();
        var needDelivery = (deliveryValue === "Доставка (+5% от суммы)");
        
        var freeDrink = (largeCount >= 2);
        var drinkHtml = '';
        var drinkText = '';
        if (freeDrink) {
            drinkHtml = '<div style="font-weight: bold; color: green;">БЕСПЛАТНЫЙ НАПИТОК! (заказано 2 и более больших пицц)</div>';
            drinkText = "БЕСПЛАТНЫЙ НАПИТОК! (заказано 2 и более больших пицц)";
        } else {
            drinkHtml = '<div>Напиток не предоставлен (нужно 2 большие пиццы, у вас ' + largeCount + ')</div>';
            drinkText = "Напиток не предоставлен (нужно 2 большие пиццы, у вас " + largeCount + ")";
        }
        
        var deliveryCost = 0;
        var deliveryMsg = '';
        var deliveryText = '';
        if (needDelivery) {
            if (largeCount >= 3) {
                deliveryCost = 0;
                deliveryMsg = 'Бесплатная доставка (за 3+ больших пицц)';
                deliveryText = 'Бесплатная доставка (за 3+ больших пицц)';
            } else {
                deliveryCost = orderSum * 0.05;
                deliveryMsg = 'Доставка (5%): ' + Math.round(deliveryCost) + ' руб.';
                deliveryText = 'Доставка (5%): ' + Math.round(deliveryCost) + ' руб.';
            }
        } else {
            deliveryMsg = 'Самовывоз (бесплатно)';
            deliveryText = 'Самовывоз (бесплатно)';
        }
        
        var totalSum = orderSum + deliveryCost;
        
        currentOrderSum = orderSum;
        currentLargeCount = largeCount;
        currentDeliveryText = deliveryText;
        currentDrinkText = drinkText;
        currentTotalSum = totalSum;
        
        var resultHtml = detailsHtml + '<hr>' +
            '<div>Сумма заказа: ' + orderSum + ' руб.</div>' +
            '<div>Всего больших пицц: ' + largeCount + ' шт.</div>' +
            drinkHtml +
            '<div>' + deliveryMsg + '</div>' +
            '<hr>' +
            '<div style="font-size: 20px"><b>ИТОГО: ' + Math.round(totalSum) + ' руб.</b></div>';
        
        document.getElementById('result').innerHTML = resultHtml;
    }

    function prepareAndSend() 
    {
    alert('Заказ отправлен на почту!');
    return true; 
}


    function resetOrder() {
        for (var i = 0; i < 5; i++) {
            document.getElementById('pizza' + i + '_check').checked = false;
            document.getElementById('pizza' + i + '_size').disabled = true;
            document.getElementById('pizza' + i + '_qty').disabled = true;
            document.getElementById('pizza' + i + '_qty').value = 1;
            document.getElementById('pizza' + i + '_size').selectedIndex = 0;
            document.getElementById('total' + i).innerHTML = '0';
        }
        document.getElementsByName('delivery')[0].checked = true;
        document.getElementById('result').innerHTML = 'Заказ сброшен. Нажмите "Оформить заказ" для подсчета суммы.';
        document.getElementById('orderSummary').value = '';
        currentOrderSum = 0;
        currentLargeCount = 0;
        currentTotalSum = 0;
    }
</script>
</body>
</html>
